name: Auto Merge Evaluation

on:
  push:
    branches:
      - master
      - master-clean
    paths:
      - 'evaluation/**'

jobs:
  merge-directories:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Determine target branch
        id: target
        run: |
          # master-clean syncs into baseline-clean; master syncs into baseline.
          src="${GITHUB_REF##refs/heads/}"
          if [ "$src" = "master-clean" ]; then
            echo "target=baseline-clean" >> "$GITHUB_OUTPUT"
          else
            echo "target=baseline" >> "$GITHUB_OUTPUT"
          fi
          echo "source=$src" >> "$GITHUB_OUTPUT"

      - name: Merge evaluation directory
        env:
          SRC: ${{ steps.target.outputs.source }}
          DST: ${{ steps.target.outputs.target }}
        run: |
          git fetch origin "$DST"
          git checkout "$DST"
          git pull origin "$DST"

          git checkout "$SRC" -- evaluation/

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Auto-merge evaluation directory from $SRC to $DST [skip ci]"
            git push origin "$DST"
          else
            echo "No changes to merge"
          fi
